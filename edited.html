<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Roommate Matching System | Elite Women-Only Personalization</title>
  <!-- Font Awesome 6 Pro -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter & Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b5cf6;
      --secondary: #6c47c2;
      --accent: #fb7185;
      --indigo: #1e1b4b;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(139, 108, 207, 0.2);
      --font-main: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: #f8fafc;
      color: var(--indigo);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Mesh Gradient Animated Background */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(251, 113, 133, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(108, 71, 194, 0.15) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(139, 108, 207, 0.1) 0px, transparent 50%);
      filter: blur(80px);
      z-index: -1;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 1000;
      padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 30px rgba(0,0,0,0.03);
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 800; font-size: 1.8rem; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .profile-icon {
      width: 50px; height: 50px; border-radius: 50%;
      background: white; border: 2px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .profile-icon:hover { transform: scale(1.1) rotate(5deg); border-color: var(--primary); }

    .main-layout { display: flex; flex: 1; padding: 0 20px; }

    .sidebar {
      background: var(--glass);
      backdrop-filter: blur(20px);
      width: 100px; margin: 30px 10px;
      border-radius: 40px; border: 1px solid var(--glass-border);
      display: flex; flex-direction: column; align-items: center; gap: 30px;
      padding: 40px 0; position: sticky; top: 110px; height: calc(100vh - 160px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .nav-item {
      background: none; border: none; color: #94a3b8;
      cursor: pointer; display: flex; flex-direction: column; align-items: center;
      gap: 8px; transition: 0.3s; width: 100%;
    }
    .nav-item i { font-size: 1.6rem; }
    .nav-item span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-item:hover, .nav-item.active { color: var(--secondary); transform: scale(1.1); }
    .nav-item.active { color: var(--primary); }

    .content { flex: 1; padding: 40px; }

    .section-title {
      font-family: var(--font-display);
      font-size: 2.2rem; font-weight: 800; margin-bottom: 30px;
      color: var(--indigo); letter-spacing: -0.5px;
    }

    /* Cards & Deck Layout */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 40px; }

    .match-card {
      background: white; border-radius: 40px; padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
      cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .match-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(139, 92, 246, 0.12); }

    .avatar-large {
      width: 60px; height: 60px; background: #f1f5f9;
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--secondary);
    }

    /* Swipe Deck & Interactions */
    #allMatchesGrid { 
      position: relative;
      height: 600px;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      perspective: 1000px;
    }

    .swipe-card {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s;
      cursor: grab;
      user-select: none;
    }
    .swipe-card:active { cursor: grabbing; }

    /* Stack layering */
    .swipe-card:nth-last-child(1) { transform: translateZ(0px); z-index: 3; }
    .swipe-card:nth-last-child(2) { transform: translateZ(-20px) translateY(10px) scale(0.95); opacity: 0.8; z-index: 2; }
    .swipe-card:nth-last-child(3) { transform: translateZ(-40px) translateY(20px) scale(0.9); opacity: 0.6; z-index: 1; }
    .swipe-card:nth-last-child(n+4) { visibility: hidden; }

    .card-inner {
      background: white; border-radius: 50px; padding: 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      border: 1px solid rgba(139, 108, 207, 0.1);
      position: relative; overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .card-inner::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
    }

    /* Interactive Progress Bar */
    .progress-bar-container { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; margin: 15px 0; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0; transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1); }

    .compatibility-badge {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      padding: 6px 18px; border-radius: 40px; font-weight: 800; font-size: 0.8rem; color: #5b21b6;
    }

    .ai-bubble {
      background: rgba(139, 92, 246, 0.04); border-radius: 30px; padding: 25px;
      border: 1px dashed rgba(139, 92, 246, 0.3); margin: 25px 0; position: relative;
    }
    .ai-bubble::after {
      content: "AI INSIGHT"; position: absolute; top: -10px; left: 25px;
      background: var(--primary); color: white; padding: 2px 12px; border-radius: 10px;
      font-size: 0.6rem; font-weight: 900;
    }

    .tag { background: #f1f5f9; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; color: #64748b; }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none; color: white; padding: 14px 28px; border-radius: 40px;
      font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 25px rgba(108, 71, 194, 0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(108, 71, 194, 0.5); }

    .btn-outline {
      background: white; border: 2px solid #e2e8f0; color: var(--indigo);
      padding: 12px 24px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* Modals */
    .modal-bg {
      position: fixed; inset:0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      visibility: hidden; opacity: 0; transition: 0.3s;
    }
    .modal-card {
      background: white; width: 90%; max-width: 600px; border-radius: 50px;
      padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);
    }

    .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .pill {
      background: #f1f5f9; padding: 8px 18px; border-radius: 30px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .pill.selected { background: var(--primary); color: white; transform: scale(1.05); }

    .hidden-page { display: none; }

    /* ── Fresh Login UI ── */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s cubic-bezier(0.23,1,0.32,1), visibility 0.2s;
      overflow: hidden;
    }
    #loginOverlay::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.8) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(251,113,133,0.65) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, rgba(99,102,241,0.55) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 90%, rgba(168,85,247,0.5) 0%, transparent 45%),
        #0f0a1e;
      animation: meshMove 10s ease-in-out infinite alternate;
    }
    @keyframes meshMove {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(20deg) brightness(1.12); }
    }
    /* floating orbs */
    .login-orb {
      position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; animation: orbFloat 7s ease-in-out infinite alternate;
    }
    .login-orb-1 { width:380px; height:380px; background:rgba(139,92,246,0.35); top:-100px; left:-100px; animation-delay:0s; }
    .login-orb-2 { width:300px; height:300px; background:rgba(251,113,133,0.3); bottom:-80px; right:-60px; animation-delay:2s; }
    .login-orb-3 { width:200px; height:200px; background:rgba(99,102,241,0.25); top:50%; left:60%; animation-delay:4s; }
    @keyframes orbFloat {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }
    .auth-card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 30px;
      padding: 48px 44px 44px;
      width: 100%; max-width: 440px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
      color: white;
      animation: cardAppear 0.8s cubic-bezier(0.23,1,0.32,1) backwards;
    }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .auth-card::after {
      content: ''; position: absolute; inset: 0; border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }
    .auth-logo {
      font-family: var(--font-display); font-size: 1.7rem; font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #e0c7ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .auth-tagline { font-size: 0.82rem; opacity: 0.55; margin-bottom: 32px; }
    /* Tab switcher */
    .auth-tabs {
      display: flex; background: rgba(255,255,255,0.07); border-radius: 14px;
      padding: 4px; margin-bottom: 30px; gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: 10px 0; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      background: transparent; color: rgba(255,255,255,0.5);
      transition: 0.25s;
    }
    .auth-tab.active {
      background: rgba(255,255,255,0.18);
      color: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .auth-form { display: none; }
    .auth-form.visible { display: block; }
    /* Input fields */
    .auth-field {
      position: relative; margin-bottom: 14px;
    }
    .auth-field i {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.9rem; pointer-events: none;
    }
    .auth-input {
      width: 100%; padding: 14px 16px 14px 42px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; color: white; font-size: 0.92rem;
      outline: none; transition: 0.25s; font-family: var(--font-main);
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.35); }
    .auth-input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.3);
    }
    .auth-error {
      color: #fca5a5; font-size: 0.8rem; margin: -8px 0 12px 4px;
      display: none; font-weight: 600;
    }
    .auth-error.show { display: block; }
    .auth-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #8b5cf6, #6c47c2);
      border: none; border-radius: 14px; color: white;
      font-size: 0.95rem; font-weight: 800; cursor: pointer;
      font-family: var(--font-main);
      box-shadow: 0 8px 25px rgba(108,71,194,0.5);
      transition: 0.25s; margin-top: 8px; letter-spacing: 0.3px;
    }
    .auth-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(108,71,194,0.6); }
    .auth-submit:active { transform: translateY(0); }
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: rgba(255,255,255,0.25); font-size: 0.78rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.12);
    }
    .auth-demo-btn {
      width: 100%; padding: 12px;
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px; color: rgba(255,255,255,0.7);
      font-size: 0.84rem; font-weight: 600; cursor: pointer;
      font-family: var(--font-main); transition: 0.25s;
    }
    .auth-demo-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.4); }
    #authBackendStatus {
      text-align: center; margin-top: 22px; font-size: 0.76rem;
      opacity: 0.55; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    /* Match Overlay */
    .match-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 3000; color: white; opacity: 0; visibility: hidden; transition: 0.5s;
    }
    .match-overlay.active { opacity: 1; visibility: visible; }
    .match-overlay h1 { font-family: var(--font-display); font-size: 4rem; color: var(--accent); margin-bottom: 20px; }

    .undo-btn {
      position: absolute; bottom: -60px; right: 0;
      background: white; border: none; padding: 10px 20px; border-radius: 20px;
      font-weight: 700; cursor: pointer; color: var(--secondary);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <!-- animated orbs -->
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div style="text-align:center; margin-bottom:8px">
      <span style="font-size:2.2rem">🏠</span>
    </div>
    <div class="auth-logo" style="text-align:center">Roommate Matching</div>
    <div class="auth-tagline" style="text-align:center">Premium Safe Living for Sisters</div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form visible" id="formLogin">
      <div class="auth-field">
        <i class="fas fa-envelope"></i>
        <input class="auth-input" type="email" id="loginEmail" placeholder="Email address" autocomplete="email" value="user0@example.com">
      </div>
      <div class="auth-field">
        <i class="fas fa-lock"></i>
        <input class="auth-input" type="password" id="loginPass" placeholder="Password" autocomplete="current-password" value="pass123">
      </div>
      <div class="auth-error" id="loginError"></div>
      <button class="auth-submit" id="loginBtn" onclick="performLogin()">Sign In to Dashboard</button>
      <div class="auth-divider">or try the demo</div>
      <button class="auth-demo-btn" onclick="fillDemo()">⚡ Use Demo Credentials</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="formRegister">
      <div class="auth-field">
        <i class="fas fa-user"></i>
        <input class="auth-input" type="text" id="regName" placeholder="Full name" autocomplete="name">
      </div>
      <div class="auth-field">
        <i class="fas fa-envelope"></i>
        <input class="auth-input" type="email" id="regEmail" placeholder="Email address" autocomplete="email">
      </div>
      <div class="auth-field">
        <i class="fas fa-birthday-cake"></i>
        <input class="auth-input" type="number" id="regAge" placeholder="Age" min="18" max="60" style="padding-left:42px">
      </div>
      <div class="auth-field">
        <i class="fas fa-briefcase"></i>
        <input class="auth-input" type="text" id="regOccupation" placeholder="Occupation" autocomplete="organization-title">
      </div>
      <div class="auth-field">
        <i class="fas fa-lock"></i>
        <input class="auth-input" type="password" id="regPass" placeholder="Password (min 6 chars)" autocomplete="new-password">
      </div>
      <div class="auth-error" id="registerError"></div>
      <button class="auth-submit" id="registerBtn" onclick="performRegister()">Create My Account</button>
    </div>

    <!-- Backend status -->
    <div id="authBackendStatus"><i class="fas fa-circle-notch fa-spin"></i> Checking backend...</div>
  </div>
</div>

<div id="matchOverlay" class="match-overlay">
  <h1>IT'S A MATCH!</h1>
  <p style="font-size:1.2rem; opacity:0.8; margin-bottom:40px">You both swiped right on each other. Start a conversation now!</p>
  <div style="display:flex; gap:20px">
    <button class="btn-primary" onclick="closeMatchOverlay()">Keep Swiping</button>
    <button class="btn-outline" style="background:transparent; color:white; border-color:white" onclick="navigateToChat()">Go to Chat</button>
  </div>
</div>

<div class="app-wrapper">
  <div class="header">
    <div class="logo-text">Roommate Matching</div>
    <div class="profile-icon" id="openProfileModalBtn"><i class="fas fa-user-astronaut fa-lg"></i></div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="nav-item active" data-page="dashboard"><i class="fas fa-house"></i><span>Home</span></div>
      <div class="nav-item" data-page="matches"><i class="fas fa-bolt-lightning"></i><span>Matches</span></div>
      <div class="nav-item" data-page="questionnaire"><i class="fas fa-list-check"></i><span>Setup</span></div>
      <div class="nav-item" data-page="messages"><i class="fas fa-message"></i><span>Chat</span></div>
      <div class="nav-item" data-page="community"><i class="fas fa-users"></i><span>Connect</span></div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

<div id="profileModal" class="modal-bg">
  <div class="modal-card">
    <h2 style="margin-bottom:25px; font-family:var(--font-display)">Personal Profile Settings</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px">
      <div><label>Displayed Name</label><input id="profileName" value="Jyotasana" style="width:100%; padding:10px; border-radius:10px; border:1px solid #e2e8f0"></div>
      <div><label>Current Age</label><input id="profileAge" type="number" value="24" style="width:100%; padding:10px; border-radius:10px; border:1px solid #e2e8f0"></div>
    </div>
    <div style="margin-bottom:25px"><label>Life Preferences</label>
      <div class="pill-group" id="sleepPrefGroup"><span class="pill" data-sleep="Morning">🌅 Morning</span><span class="pill" data-sleep="Night">🌙 Night</span></div>
      <div class="pill-group" id="habitsGroup"><span class="pill" data-habit="Organized">📦 Organized</span><span class="pill" data-habit="Flexible">🌀 Flexible</span></div>
    </div>
    <button class="btn-primary" style="width:100%" id="closeModalBtn">Synchronize Changes</button>
  </div>
</div>

<script>
  let authToken = '';
  let currentCardIndex = 0;
  let matchesForSwipe = [];
  let currentFilter = null;
  const API_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://localhost:8000/api/v1' : '/api/v1';

  const roommatesDataset = [
    { id:1, name:"Jyotasana", age:24, occupation:"Nurse", sleepPref:"Night", sleepSense:"Light Sleeper", personality:"Extrovert", livingHabit:"Organized", noiseTolerance:"Quiet", guestPolicy:"No Guests", verified:true, compatibilityScore:9.2 },

  async function authenticate() {
    try {
      const email = document.getElementById('loginEmail').value || 'user0@example.com';
      const password = document.getElementById('loginPass').value || 'pass123';
      const formData = new URLSearchParams();
      formData.append('username', email);
      formData.append('password', password);
      const res = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });
      if (res.ok) {
        const data = await res.json();
        authToken = data.access_token;
      } else {
        authToken = null;
      }
    } catch(e) { 
      console.error('Login failed', e); 
      authToken = null;
    }
  }

  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('visible'));
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
    
    if (tab === 'login') {
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('formLogin').classList.add('visible');
    } else {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('formRegister').classList.add('visible');

    const errEl = document.getElementById(form === 'login' ? 'loginError' : 'registerError');

    const btn = document.getElementById('loginBtn');
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
    document.getElementById('loginError').classList.remove('show');
    
    try {
      await authenticate(); // uses loginEmail and loginPass
      if(authToken) {
        // Fetch profile after login
        const res = await fetch(`${API_URL}/users/me`, {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        
        if (!res.ok) throw new Error('Profile fetch failed');
        
        currentUser = await res.json();
        
        document.getElementById('loginOverlay').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loginOverlay').style.visibility = 'hidden';

      } else {
        btn.innerHTML = original;
        showError('login', 'Invalid email or password.');
      }
    } catch(e) {
      btn.innerHTML = original;
      showError('login', 'Backend API error. Please check your connection.');

    const occupation = document.getElementById('regOccupation').value;
    const pass = document.getElementById('regPass').value;

    if (!name || !email || !age || !occupation || !pass) {
      showError('register', 'Please fill all fields.');
      return;
    }
    if (pass.length < 6) {
      showError('register', 'Password must be at least 6 characters.');
      return;
    }

    const btn = document.getElementById('registerBtn');
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
    document.getElementById('registerError').classList.remove('show');
    
    try {
      const res = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          password: pass,
          name: name,
          age: age,
          occupation: occupation,
          preferences: {
            sleep_pref: "Morning",
            sleep_sense: "Light Sleeper",

        const data = await res.json().catch(() => ({ detail: 'Unknown server error' }));
        btn.innerHTML = original;
        showError('register', data.detail || data.message || 'Registration failed.');
      }
    } catch(e) {

    }

      const pillValue = pill.dataset[Object.keys(optionsMap)[0]];
      if(pillValue === currentUser[userKey]) pill.classList.add('selected');
    });

  async function fetchAndRenderMatches() {
    const grid = document.getElementById('allMatchesGrid');

    try {
      const res = await fetch(`${API_URL}/matches`, { headers: { 'Authorization': 'Bearer ' + authToken } });
      const data = await res.json();
      matchesForSwipe = data.matches.map(m => ({
        id: m.user.id, name: m.user.name, age: m.user.age, occupation: m.user.occupation,
        compatibilityScore: m.compatibility_score, explanation: m.explanation,
        sleepPref: m.user.preference.sleep_pref, livingHabit: m.user.preference.living_habit

  function renderSwipeStack() {
    const grid = document.getElementById('allMatchesGrid');
    grid.innerHTML = '';
    
    if (currentCardIndex >= matchesForSwipe.length) {
      grid.innerHTML = '<div style="text-align:center; padding:100px"><i class="fas fa-heart fa-4x" style="color:var(--accent)"></i><h3>You\'ve reached the end!</h3></div>';
      return;
    }

    // Render up to 3 cards for the stack effect
    for (let i = Math.min(currentCardIndex + 2, matchesForSwipe.length - 1); i >= currentCardIndex; i--) {
      const m = matchesForSwipe[i];
      const card = document.createElement('div');
      card.className = 'swipe-card';
      card.innerHTML = `
        <div class="card-inner">
          <div style="display:flex; justify-content:space-between">
            <h2 style="font-size:2.4rem; font-family:var(--font-display)">${m.name}, ${m.age}</h2>
            <div class="compatibility-badge">${Math.round(m.compatibilityScore * 10)}%</div>
          </div>
          <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${m.compatibilityScore * 10}%"></div></div>
          <div class="ai-bubble" style="flex:1"><p style="font-style:italic; font-size:1.1rem">"${m.explanation}"</p></div>
          <div style="display:flex; gap:10px; margin-top:20px"><div class="tag">${m.occupation}</div><div class="tag">${m.sleepPref} Cycle</div></div>
          <div style="display:flex; justify-content:center; gap:30px; margin-top:50px">
            <div class="btn-outline" style="border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center" onclick="handleSwipe('PASS')"><i class="fas fa-times fa-2x"></i></div>
            <div class="btn-primary" style="border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center" onclick="handleSwipe('LIKE')"><i class="fas fa-heart fa-2x"></i></div>
          </div>
        </div>
      `;
      
      if (i === currentCardIndex) {
        initDrag(card);
      }
      grid.appendChild(card);
    }
  }

  function initDrag(card) {
    let startX = 0;
    let currentX = 0;
    
    card.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      card.style.transition = 'none';
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    card.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      card.style.transition = 'none';
      document.addEventListener('touchmove', onTouchMove);
      document.addEventListener('touchend', onTouchEnd);
    });

    function onMouseMove(e) {
      currentX = e.clientX - startX;
      updateCardTransform();
    }

    function onTouchMove(e) {
      currentX = e.touches[0].clientX - startX;
      updateCardTransform();
    }

    function updateCardTransform() {
      const rotation = currentX / 20;
      card.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
      
      // Visual feedback via opacity or background color can be added here
    }

    function onMouseUp() {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      finalizeSwipe();
    }

    function onTouchEnd() {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      finalizeSwipe();
    }

    function finalizeSwipe() {
      card.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      if (currentX > 150) {
        handleSwipe('LIKE');
      } else if (currentX < -150) {
        handleSwipe('PASS');
      } else {
        card.style.transform = 'translateX(0) rotate(0)';
      }
      currentX = 0;
    }
  }

  async function handleSwipe(action) {
    const cards = document.querySelectorAll('.swipe-card');
    const card = cards[cards.length - 1]; // Top-most card is the last child
    if(!card) return;
    
    const m = matchesForSwipe[currentCardIndex];
    card.style.transform = `translateX(${action==='LIKE'?1000:-1000}px) rotate(${action==='LIKE'?30:-30}deg)`;
    card.style.opacity = '0';
    
    // Sync with backend API
    try {
      if(!authToken) await authenticate();
      const res = await fetch(`${API_URL}/matches/swipe`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + authToken
        },
        body: JSON.stringify({ target_id: m.id, action: action })
      });
      const data = await res.json();
      if (data.mutual_match) {
        showMatchOverlay();
      }
    } catch(e) { console.warn('Swipe sync failed', e); }

    currentCardIndex++;
    setTimeout(renderSwipeStack, 500);
  }

  }

  async function savePreferences() {

    await authenticate();
    const res = await fetch(`${API_URL}/users/update`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ 
        preferences: prefs

    currentUser = await res.json();

    matchesForSwipe = [];

  }
