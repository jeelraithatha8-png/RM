<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Roommate Matching System | Elite Women-Only Personalization</title>
  <!-- Font Awesome 6 Pro -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter & Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b5cf6;
      --secondary: #6c47c2;
      --accent: #fb7185;
      --indigo: #1e1b4b;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(139, 108, 207, 0.2);
      --font-main: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: #f8fafc;
      color: var(--indigo);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Mesh Gradient Animated Background */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(251, 113, 133, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(108, 71, 194, 0.15) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(139, 108, 207, 0.1) 0px, transparent 50%);
      filter: blur(80px);
      z-index: -1;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 1000;
      padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 30px rgba(0,0,0,0.03);
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 800; font-size: 1.8rem; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .profile-icon {
      width: 50px; height: 50px; border-radius: 50%;
      background: white; border: 2px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .profile-icon:hover { transform: scale(1.1) rotate(5deg); border-color: var(--primary); }

    .main-layout { display: flex; flex: 1; padding: 0 20px; }

    .sidebar {
      background: var(--glass);
      backdrop-filter: blur(20px);
      width: 100px; margin: 30px 10px;
      border-radius: 40px; border: 1px solid var(--glass-border);
      display: flex; flex-direction: column; align-items: center; gap: 30px;
      padding: 40px 0; position: sticky; top: 110px; height: calc(100vh - 160px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .nav-item {
      background: none; border: none; color: #94a3b8;
      cursor: pointer; display: flex; flex-direction: column; align-items: center;
      gap: 8px; transition: 0.3s; width: 100%;
    }
    .nav-item i { font-size: 1.6rem; }
    .nav-item span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-item:hover, .nav-item.active { color: var(--secondary); transform: scale(1.1); }
    .nav-item.active { color: var(--primary); }

    .content { flex: 1; padding: 40px; }

    .section-title {
      font-family: var(--font-display);
      font-size: 2.2rem; font-weight: 800; margin-bottom: 30px;
      color: var(--indigo); letter-spacing: -0.5px;
    }

    /* Cards & Deck Layout */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 40px; }

    .match-card {
      background: white; border-radius: 40px; padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
      cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .match-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(139, 92, 246, 0.12); }

    .avatar-large {
      width: 60px; height: 60px; background: #f1f5f9;
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--secondary);
    }

    /* Swipe Deck & Interactions */
    #allMatchesGrid { 
      position: relative;
      height: 600px;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      perspective: 1000px;
    }

    .swipe-card {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s;
      cursor: grab;
      user-select: none;
    }
    .swipe-card:active { cursor: grabbing; }

    /* Stack layering */
    .swipe-card:nth-last-child(1) { transform: translateZ(0px); z-index: 3; }
    .swipe-card:nth-last-child(2) { transform: translateZ(-20px) translateY(10px) scale(0.95); opacity: 0.8; z-index: 2; }
    .swipe-card:nth-last-child(3) { transform: translateZ(-40px) translateY(20px) scale(0.9); opacity: 0.6; z-index: 1; }
    .swipe-card:nth-last-child(n+4) { visibility: hidden; }

    .card-inner {
      background: white; border-radius: 50px; padding: 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      border: 1px solid rgba(139, 108, 207, 0.1);
      position: relative; overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .card-inner::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
    }

    /* Interactive Progress Bar */
    .progress-bar-container { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; margin: 15px 0; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0; transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1); }

    .compatibility-badge {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      padding: 6px 18px; border-radius: 40px; font-weight: 800; font-size: 0.8rem; color: #5b21b6;
    }

    .ai-bubble {
      background: rgba(139, 92, 246, 0.04); border-radius: 30px; padding: 25px;
      border: 1px dashed rgba(139, 92, 246, 0.3); margin: 25px 0; position: relative;
    }
    .ai-bubble::after {
      content: "AI INSIGHT"; position: absolute; top: -10px; left: 25px;
      background: var(--primary); color: white; padding: 2px 12px; border-radius: 10px;
      font-size: 0.6rem; font-weight: 900;
    }

    .tag { background: #f1f5f9; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; color: #64748b; }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none; color: white; padding: 14px 28px; border-radius: 40px;
      font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 25px rgba(108, 71, 194, 0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(108, 71, 194, 0.5); }

    .btn-outline {
      background: white; border: 2px solid #e2e8f0; color: var(--indigo);
      padding: 12px 24px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* Modals */
    .modal-bg {
      position: fixed; inset:0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      visibility: hidden; opacity: 0; transition: 0.3s;
    }
    .modal-card {
      background: white; width: 90%; max-width: 600px; border-radius: 50px;
      padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.2);
    }

    .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .pill {
      background: #f1f5f9; padding: 8px 18px; border-radius: 30px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .pill.selected { background: var(--primary); color: white; transform: scale(1.05); }

    .hidden-page { display: none; }

    /* Login UI */
    #loginOverlay {
      position: fixed; inset: 0; background: linear-gradient(135deg, var(--secondary), var(--primary));
      z-index: 9999; display: flex; align-items: center; justify-content: center; 
      transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .login-card {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(30px); border-radius: 50px;
      padding: 50px; text-align: center; color: white; width: 100%; max-width: 450px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    /* Match Overlay */
    .match-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 3000; color: white; opacity: 0; visibility: hidden; transition: 0.5s;
    }
    .match-overlay.active { opacity: 1; visibility: visible; }
    .match-overlay h1 { font-family: var(--font-display); font-size: 4rem; color: var(--accent); margin-bottom: 20px; }

    .undo-btn {
      position: absolute; bottom: -60px; right: 0;
      background: white; border: none; padding: 10px 20px; border-radius: 20px;
      font-weight: 700; cursor: pointer; color: var(--secondary);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <h1 style="font-family:var(--font-display); font-size:3rem; margin-bottom:10px;">Roommate Matching</h1>
    <p style="margin-bottom:40px; opacity:0.8;">Premium Safe Living for Sisters</p>
    <div style="text-align:left; margin-bottom:20px; font-size:0.8rem; opacity:0.7">Demo: user0@example.com / pass123</div>
    <input type="email" id="loginEmail" value="user0@example.com" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); width:100%; padding:15px; border-radius:15px; color:white; margin-bottom:12px; outline:none">
    <input type="password" id="loginPass" value="pass123" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); width:100%; padding:15px; border-radius:15px; color:white; margin-bottom:25px; outline:none">
    <button onclick="performLogin()" class="btn-primary" style="background:white; color:var(--secondary); width:100%">Access Elite Dashboard</button>
  </div>
</div>

<div id="matchOverlay" class="match-overlay">
  <h1>IT'S A MATCH!</h1>
  <p style="font-size:1.2rem; opacity:0.8; margin-bottom:40px">You both swiped right on each other. Start a conversation now!</p>
  <div style="display:flex; gap:20px">
    <button class="btn-primary" onclick="closeMatchOverlay()">Keep Swiping</button>
    <button class="btn-outline" style="background:transparent; color:white; border-color:white" onclick="navigateToChat()">Go to Chat</button>
  </div>
</div>

<div class="app-wrapper">
  <div class="header">
    <div class="logo-text">Roommate Matching</div>
    <div class="profile-icon" id="openProfileModalBtn"><i class="fas fa-user-astronaut fa-lg"></i></div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="nav-item active" data-page="dashboard"><i class="fas fa-house"></i><span>Home</span></div>
      <div class="nav-item" data-page="matches"><i class="fas fa-bolt-lightning"></i><span>Matches</span></div>
      <div class="nav-item" data-page="questionnaire"><i class="fas fa-list-check"></i><span>Setup</span></div>
      <div class="nav-item" data-page="messages"><i class="fas fa-message"></i><span>Chat</span></div>
      <div class="nav-item" data-page="community"><i class="fas fa-users"></i><span>Connect</span></div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

<div id="profileModal" class="modal-bg">
  <div class="modal-card">
    <h2 style="margin-bottom:25px; font-family:var(--font-display)">Personal Profile Settings</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px">
      <div><label>Displayed Name</label><input id="profileName" value="Jyotasana" style="width:100%; padding:10px; border-radius:10px; border:1px solid #e2e8f0"></div>
      <div><label>Current Age</label><input id="profileAge" type="number" value="24" style="width:100%; padding:10px; border-radius:10px; border:1px solid #e2e8f0"></div>
    </div>
    <div style="margin-bottom:25px"><label>Life Preferences</label>
      <div class="pill-group" id="sleepPrefGroup"><span class="pill" data-sleep="Morning">🌅 Morning</span><span class="pill" data-sleep="Night">🌙 Night</span></div>
      <div class="pill-group" id="habitsGroup"><span class="pill" data-habit="Organized">📦 Organized</span><span class="pill" data-habit="Flexible">🌀 Flexible</span></div>
    </div>
    <button class="btn-primary" style="width:100%" id="closeModalBtn">Synchronize Changes</button>
  </div>
</div>

<script>
  let authToken = '';
  let currentCardIndex = 0;
  let matchesForSwipe = [];
  let currentFilter = null;
  const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000/api/v1' : '/api/v1';

  const roommatesDataset = [
    { id:1, name:"Jyotasana", age:24, occupation:"Nurse", sleepPref:"Night", sleepSense:"Light Sleeper", personality:"Extrovert", livingHabit:"Organized", noiseTolerance:"Quiet", guestPolicy:"No Guests", verified:true, compatibilityScore:9.2 },
    { id:2, name:"Arpita", age:27, occupation:"Developer", sleepPref:"Morning", sleepSense:"Heavy Sleeper", personality:"Introvert", livingHabit:"Flexible", noiseTolerance:"Quiet", guestPolicy:"Occasional", verified:true, compatibilityScore:8.8 },
    { id:3, name:"Yaashi", age:22, occupation:"Student", sleepPref:"Night", sleepSense:"Heavy Sleeper", personality:"Extrovert", livingHabit:"Mixed", noiseTolerance:"Noisy", guestPolicy:"Male Allowed", verified:false, compatibilityScore:7.2 },
    { id:4, name:"Bhoomika", age:25, occupation:"Designer", sleepPref:"Evening", sleepSense:"Light Sleeper", personality:"Introvert", livingHabit:"Flexible", noiseTolerance:"Quiet", guestPolicy:"Occasional", verified:true, compatibilityScore:9.5 }
  ];

  let currentUser = {}; // Will be populated from /api/v1/users/me
  let lastSwipedCard = null; // For Undo

  function initializePill(groupId, value) {
    const container = document.getElementById(groupId);
    if(!container || !value) return;
    const pills = container.querySelectorAll('.pill');
    pills.forEach(p => {
      if(p.innerText.toLowerCase().includes(value.toLowerCase())) p.classList.add('selected');
      p.onclick = () => {
        container.querySelectorAll('.pill').forEach(pill => pill.classList.remove('selected'));
        p.classList.add('selected');
      };
    });
  }

  function getSelectedPillValue(groupId) {
    const selected = document.querySelector(`#${groupId} .pill.selected`);
    if (!selected) return null;
    return selected.dataset.food || selected.dataset.smoking || selected.dataset.ac || selected.dataset.pet || selected.dataset.habit || selected.dataset.sleep;
  }

  async function authenticate() {
    try {
      const formData = new URLSearchParams();
      formData.append('username', 'user0@example.com');
      formData.append('password', 'pass123');
      const res = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });
      const data = await res.json();
      authToken = data.access_token;
    } catch(e) { console.error('Auto login failed', e); }
  }

  async function performLogin() {
    const btn = document.querySelector('#loginOverlay .btn-primary');
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
    await authenticate();
    if(authToken) {
      // Fetch profile after login
      try {
        const res = await fetch(`${API_URL}/users/me`, {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        currentUser = await res.json();
        
        document.getElementById('loginOverlay').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loginOverlay').style.visibility = 'hidden';
          refreshActivePage();
        }, 600);
      } catch(e) {
        btn.innerHTML = original;
        alert('Failed to fetch profile data.');
      }
    } else {
      btn.innerHTML = original;
      alert('Authentication failed. Please verify the backend is running.');
    }
  }

  function makePillGroup(groupId, userKey, optionsMap) {
    const container = document.getElementById(groupId);
    if(!container) return;
    const pills = container.querySelectorAll('.pill');
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('selected'));
        pill.classList.add('selected');
        let value = '';
        for(let key in optionsMap) { if(pill.dataset[key]) { value = pill.dataset[key]; break; } }
        if(value) currentUser[userKey] = value;
      });
      const pillValue = pill.dataset[Object.keys(optionsMap)[0]];
      if(pillValue === currentUser[userKey]) pill.classList.add('selected');
    });
  }

  function renderPage(p) {
    const content = document.getElementById('mainContent');
    if(p === 'dashboard') {
      content.innerHTML = `<h1 class="section-title">Elite Match Dashboard</h1><div class="cards-grid" id="topMatchesContainer"></div>`;
      renderTopMatches();
    } else if(p === 'matches') {
      content.innerHTML = `<h1 class="section-title">Smart AI Shuffle</h1><div id="allMatchesGrid"></div>
      <div style="text-align:center; margin-top:20px">
        <button class="btn-outline" onclick="undoSwipe()"><i class="fas fa-undo"></i> Undo Swipe</button>
      </div>`;
      fetchAndRenderMatches();
    } else if(p === 'questionnaire') {
      content.innerHTML = `<h1 class="section-title">Preference Logic</h1><div style="background:white; padding:40px; border-radius:50px; max-width:800px; box-shadow:0 10px 40px rgba(0,0,0,0.03)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px">
          <div>
            <div style="margin-bottom:25px"><label>Vegetarian / Non-Veg</label><div class="pill-group" id="qFoodGroup"><div class="pill" data-food="Vegetarian">🥗 Veg</div><div class="pill" data-food="Non-Veg">🍗 Non-Veg</div></div></div>
            <div style="margin-bottom:25px"><label>Smoking Habit</label><div class="pill-group" id="qSmokingGroup"><div class="pill" data-smoking="Non-Smoker">🚭 No</div><div class="pill" data-smoking="Smoker">🚬 Yes</div></div></div>
            <div style="margin-bottom:25px"><label>AC Usage</label><div class="pill-group" id="qAcGroup"><div class="pill" data-ac="Always On">❄️ Always</div><div class="pill" data-ac="Eco-friendly">🍃 Eco</div><div class="pill" data-ac="Night Only">🌙 Night</div></div></div>
          </div>
          <div>
            <div style="margin-bottom:25px"><label>Pet Policy</label><div class="pill-group" id="qPetGroup"><div class="pill" data-pet="Pet-Lover">🐾 Lover</div><div class="pill" data-pet="No Pets">🚫 None</div></div></div>
            <div style="margin-bottom:25px"><label>Living Habit</label><div class="pill-group" id="qHabitGroup"><div class="pill" data-habit="Organized">📦 Organized</div><div class="pill" data-habit="Flexible">🌀 Flexible</div></div></div>
            <div style="margin-bottom:25px"><label>Sleep Preference</label><div class="pill-group" id="qSleepGroup"><div class="pill" data-sleep="Morning">🌅 Morning</div><div class="pill" data-sleep="Night">🌙 Night</div></div></div>
          </div>
        </div>
        <button class="btn-primary" style="width:100%; margin-top:20px" onclick="savePreferences()">Sync with AI Engine</button>
      </div>`;
      
      // Initialize pills with current user data
      setTimeout(() => {
        const p = currentUser.preference || {};
        initializePill('qFoodGroup', p.food_pref);
        initializePill('qSmokingGroup', p.smoking_habit);
        initializePill('qAcGroup', p.ac_usage);
        initializePill('qPetGroup', p.pet_friendly);
        initializePill('qHabitGroup', p.living_habit);
        initializePill('qSleepGroup', p.sleep_pref);
      }, 0);
    } else if(p === 'messages') {
      content.innerHTML = `<h1 class="section-title">Encrypted Conversations</h1>
        <div style="display:grid; grid-template-columns:300px 1fr; gap:20px; background:white; border-radius:40px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.03); height:600px">
          <div style="border-right:1px solid #f1f5f9; padding:20px">
            <div style="padding:10px; background:#f8fafc; border-radius:15px; margin-bottom:20px"><i class="fas fa-search"></i> Search sisters...</div>
            <div class="match-card" style="padding:15px; margin-bottom:10px; border-radius:20px; background:rgba(139, 92, 246, 0.05)">
              <strong>Arpita</strong><p style="font-size:0.8rem; opacity:0.7">Hey! I saw we matches. When are you moving?</p>
            </div>
            <div class="match-card" style="padding:15px; margin-bottom:10px; border-radius:20px">
              <strong>Bhoomika</strong><p style="font-size:0.8rem; opacity:0.7">Liked your vibe!</p>
            </div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px">
            <i class="fas fa-comments-alt fa-4x" style="color:var(--primary); opacity:0.2; margin-bottom:20px"></i>
            <h3>Select a conversation</h3>
            <p class="text-muted">Your private messages are end-to-end encrypted for safety.</p>
          </div>
        </div>`;
    } else if(p === 'community') {
      content.innerHTML = `<h1 class="section-title">Sisterhood Forums</h1>
        <div style="display:grid; gap:20px">
          <div class="match-card" style="cursor:default; border-left:5px solid var(--primary)">
            <div style="display:flex; justify-content:space-between">
              <strong>🏠 Moving to Bangalore: Tips for newcomers</strong>
              <span class="tag" style="background:var(--primary); color:white">HOT</span>
            </div>
            <p class="text-muted" style="margin-top:8px">12 Replies · Active now by @Sneha_Loves_Law</p>
          </div>
          <div class="match-card" style="cursor:default; border-left:5px solid var(--accent)">
            <div style="display:flex; justify-content:space-between">
              <strong>🛡️ Safety check-in buddy system: HSR Layout</strong>
              <span class="tag">SAFETY</span>
            </div>
            <p class="text-muted" style="margin-top:8px">42 Replies · Active yesterday by @VerifyMeAditi</p>
          </div>
          <div class="match-card" style="cursor:default">
            <strong>🍱 Tiffin services in Whitefield?</strong>
            <p class="text-muted" style="margin-top:8px">5 Replies · Active 2h ago</p>
          </div>
        </div>`;
    }
  }

  async function fetchAndRenderMatches() {
    const grid = document.getElementById('allMatchesGrid');
    grid.innerHTML = '<div style="margin-top:100px; text-align:center"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--primary)"></i><p style="margin-top:20px; font-weight:700">Groq AI is personalizing your deck...</p></div>';
    if(!authToken) await authenticate();
    try {
      const res = await fetch(`${API_URL}/matches`, { headers: { 'Authorization': 'Bearer ' + authToken } });
      const data = await res.json();
      matchesForSwipe = data.matches.map(m => ({
        id: m.user.id, name: m.user.name, age: m.user.age, occupation: m.user.occupation,
        compatibilityScore: m.compatibility_score, explanation: m.explanation,
        sleepPref: m.user.preference.sleep_pref, livingHabit: m.user.preference.living_habit
      }));
      currentCardIndex = 0;
      renderSwipeStack();
    } catch(e) { grid.innerHTML = "Offline simulation: Use Mock Grid"; }
  }

  function renderSwipeStack() {
    const grid = document.getElementById('allMatchesGrid');
    grid.innerHTML = '';
    
    if (currentCardIndex >= matchesForSwipe.length) {
      grid.innerHTML = '<div style="text-align:center; padding:100px"><i class="fas fa-heart fa-4x" style="color:var(--accent)"></i><h3>You\'ve reached the end!</h3></div>';
      return;
    }

    // Render up to 3 cards for the stack effect
    for (let i = Math.min(currentCardIndex + 2, matchesForSwipe.length - 1); i >= currentCardIndex; i--) {
      const m = matchesForSwipe[i];
      const card = document.createElement('div');
      card.className = 'swipe-card';
      card.innerHTML = `
        <div class="card-inner">
          <div style="display:flex; justify-content:space-between">
            <h2 style="font-size:2.4rem; font-family:var(--font-display)">${m.name}, ${m.age}</h2>
            <div class="compatibility-badge">${Math.round(m.compatibilityScore * 10)}%</div>
          </div>
          <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${m.compatibilityScore * 10}%"></div></div>
          <div class="ai-bubble" style="flex:1"><p style="font-style:italic; font-size:1.1rem">"${m.explanation}"</p></div>
          <div style="display:flex; gap:10px; margin-top:20px"><div class="tag">${m.occupation}</div><div class="tag">${m.sleepPref} Cycle</div></div>
          <div style="display:flex; justify-content:center; gap:30px; margin-top:50px">
            <div class="btn-outline" style="border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center" onclick="handleSwipe('PASS')"><i class="fas fa-times fa-2x"></i></div>
            <div class="btn-primary" style="border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center" onclick="handleSwipe('LIKE')"><i class="fas fa-heart fa-2x"></i></div>
          </div>
        </div>
      `;
      
      if (i === currentCardIndex) {
        initDrag(card);
      }
      grid.appendChild(card);
    }
  }

  function initDrag(card) {
    let startX = 0;
    let currentX = 0;
    
    card.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      card.style.transition = 'none';
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    card.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      card.style.transition = 'none';
      document.addEventListener('touchmove', onTouchMove);
      document.addEventListener('touchend', onTouchEnd);
    });

    function onMouseMove(e) {
      currentX = e.clientX - startX;
      updateCardTransform();
    }

    function onTouchMove(e) {
      currentX = e.touches[0].clientX - startX;
      updateCardTransform();
    }

    function updateCardTransform() {
      const rotation = currentX / 20;
      card.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
      
      // Visual feedback via opacity or background color can be added here
    }

    function onMouseUp() {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      finalizeSwipe();
    }

    function onTouchEnd() {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      finalizeSwipe();
    }

    function finalizeSwipe() {
      card.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      if (currentX > 150) {
        handleSwipe('LIKE');
      } else if (currentX < -150) {
        handleSwipe('PASS');
      } else {
        card.style.transform = 'translateX(0) rotate(0)';
      }
      currentX = 0;
    }
  }

  async function handleSwipe(action) {
    const cards = document.querySelectorAll('.swipe-card');
    const card = cards[cards.length - 1]; // Top-most card is the last child
    if(!card) return;
    
    const m = matchesForSwipe[currentCardIndex];
    card.style.transform = `translateX(${action==='LIKE'?1000:-1000}px) rotate(${action==='LIKE'?30:-30}deg)`;
    card.style.opacity = '0';
    
    // Sync with backend API
    try {
      if(!authToken) await authenticate();
      const res = await fetch(`${API_URL}/matches/swipe`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + authToken
        },
        body: JSON.stringify({ target_id: m.id, action: action })
      });
      const data = await res.json();
      if (data.mutual_match) {
        showMatchOverlay();
      }
    } catch(e) { console.warn('Swipe sync failed', e); }

    currentCardIndex++;
    setTimeout(renderSwipeStack, 500);
  }

  function showMatchOverlay() {
    document.getElementById('matchOverlay').classList.add('active');
  }

  function closeMatchOverlay() {
    document.getElementById('matchOverlay').classList.remove('active');
  }

  function navigateToChat() {
    closeMatchOverlay();
    document.querySelector('[data-page="messages"]').click();
  }

  function renderTopMatches() {
    const container = document.getElementById('topMatchesContainer');
    const matches = matchesForSwipe.length > 0 ? matchesForSwipe.slice(0, 3) : roommatesDataset.slice(0, 3);
    container.innerHTML = matches.map(m => `
      <div class="match-card">
        <div style="display:flex; gap:20px; align-items:center">
          <div class="avatar-large"><i class="fas fa-female"></i></div>
          <div style="flex:1">
            <h3 style="font-weight:800">${m.name}</h3>
            <div class="progress-bar-container" style="height:4px"><div class="progress-bar-fill" style="width:${m.compatibilityScore * 10}%"></div></div>
            <div style="font-size:0.7rem; font-weight:800; color:var(--primary)">MATCHED BY AI</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function savePreferences() {
    const prefs = {
      food_pref: getSelectedPillValue('qFoodGroup'),
      smoking_habit: getSelectedPillValue('qSmokingGroup'),
      ac_usage: getSelectedPillValue('qAcGroup'),
      pet_friendly: getSelectedPillValue('qPetGroup'),
      living_habit: getSelectedPillValue('qHabitGroup'),
      sleep_pref: getSelectedPillValue('qSleepGroup')
    };
    
    await authenticate();
    const res = await fetch(`${API_URL}/users/update`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ 
        preferences: prefs 
      })
    });
    currentUser = await res.json();
    alert("✨ Preferences synchronized with Groq AI.");
    matchesForSwipe = [];
    refreshActivePage();
  }

  function undoSwipe() {
    if (currentCardIndex > 0) {
      currentCardIndex--;
      renderSwipeStack();
      alert("Undo successful. Swiping back...");
    } else {
      alert("No previous swipe to undo.");
    }
  }

  function refreshActivePage() {
    const active = document.querySelector('.nav-item.active');
    if(active) renderPage(active.dataset.page);
  }

  const modal = document.getElementById('profileModal');
  document.getElementById('openProfileModalBtn').addEventListener('click', () => {
    modal.style.visibility = 'visible'; modal.style.opacity = '1';
    makePillGroup('sleepPrefGroup', 'sleepPref', { sleep: 'sleepPref' });
    makePillGroup('habitsGroup', 'livingHabit', { habit: 'livingHabit' });
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    // Capture values from inputs
    currentUser.name = document.getElementById('profileName').value;
    currentUser.age = parseInt(document.getElementById('profileAge').value) || 24;
    
    modal.style.visibility = 'hidden'; modal.style.opacity = '0';
    savePreferences();
  });

  document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPage(btn.dataset.page);
  }));

  renderPage('dashboard');
</script>
</body>
