<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nest & Found | Premium Women-Only Roommate Matching</title>
  <!-- Font Awesome 6 Pro (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fef9f4 0%, #fdf4f8 100%);
      color: #2d2a3e;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f3ecfc; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #b392e0, #8b6ccf); border-radius: 10px; }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(108, 71, 194, 0.2); }
      50% { box-shadow: 0 0 20px rgba(108, 71, 194, 0.4); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Premium Header */
    .header {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 200;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(139, 108, 207, 0.15);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #8b6ccf, #6c47c2);
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 8px 20px rgba(108, 71, 194, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    .logo-icon i { font-size: 1.5rem; }

    .logo-text {
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #5e3c9e, #9b7bdf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-tagline {
      font-size: 0.7rem;
      color: #9b8ab5;
      margin-left: 4px;
      font-weight: 500;
    }

    .badge-verified {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #e6f4e6, #d4edd2);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #2a6b2a;
      border: 1px solid rgba(70, 130, 70, 0.2);
      backdrop-filter: blur(4px);
    }

    .badge-verified i { font-size: 1rem; color: #3c9e3c; }

    .profile-icon {
      background: linear-gradient(135deg, #f5efff, #e8defc);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6c47c2;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 2px solid white;
      box-shadow: 0 6px 16px rgba(108, 71, 194, 0.2);
    }

    .profile-icon:hover {
      transform: scale(1.05) rotate(5deg);
      background: linear-gradient(135deg, #e8dcff, #dacdff);
    }

    /* Sidebar - Elegant Glassmorphism */
    .main-layout { display: flex; flex: 1; }
    .sidebar {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      width: 96px;
      border-right: 1px solid rgba(139, 108, 207, 0.2);
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #9a87b9;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: 12px 0;
      transition: all 0.3s;
      border-radius: 24px;
      position: relative;
    }

    .nav-item i { font-size: 1.6rem; transition: all 0.3s; }

    .nav-item:hover {
      color: #6c47c2;
      background: rgba(108, 71, 194, 0.08);
    }

    .nav-item:hover i { transform: translateY(-3px) scale(1.05); }

    .nav-item.active {
      color: #6c47c2;
      background: linear-gradient(135deg, rgba(108, 71, 194, 0.12), rgba(139, 108, 207, 0.08));
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 3px;
      background: linear-gradient(135deg, #6c47c2, #b392e0);
      border-radius: 0 4px 4px 0;
    }

    .content {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      max-width: 100%;
    }

    /* Cards & Components */
    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #4a3a6e, #7a5cae);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .cards-grid {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding-bottom: 20px;
      margin-bottom: 32px;
      scrollbar-width: thin;
    }

    .match-card {
      min-width: 280px;
      background: white;
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(190, 160, 230, 0.3);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
    }

    .match-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(108, 71, 194, 0.12);
      border-color: #cbb8f0;
    }

    .avatar-large {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #e8defc, #d9caff);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #6c47c2;
    }

    .match-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      background: linear-gradient(135deg, #f5f0fe, #ede5ff);
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6c47c2;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 28px 0 32px 0;
    }

    .chip {
      background: white;
      border: 1.5px solid #e5d9fc;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #5e4a82;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .chip i { font-size: 0.9rem; }

    .chip:hover {
      border-color: #b392e0;
      background: #faf7ff;
      transform: translateY(-2px);
    }

    .chip.active {
      background: linear-gradient(135deg, #6c47c2, #8b6ccf);
      border-color: #6c47c2;
      color: white;
      box-shadow: 0 8px 18px rgba(108, 71, 194, 0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c47c2, #8b6ccf);
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 16px rgba(108, 71, 194, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(108, 71, 194, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #d9caff;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #6c47c2;
    }

    .btn-outline:hover {
      background: #f5efff;
      border-color: #b392e0;
      transform: translateY(-2px);
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 28px;
      margin-top: 20px;
    }

    .profile-card {
      background: white;
      border-radius: 32px;
      padding: 22px;
      border: 1px solid rgba(190, 160, 230, 0.25);
      transition: all 0.4s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #6c47c2, #b392e0, #e0d4ff);
      transform: scaleX(0);
      transition: transform 0.4s;
    }

    .profile-card:hover::before {
      transform: scaleX(1);
    }

    .profile-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(108, 71, 194, 0.1);
      border-color: #d9caff;
    }

    .compatibility-badge {
      background: linear-gradient(135deg, #e9e3ff, #dfd5fc);
      border-radius: 40px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-weight: 800;
      color: #5b3d9e;
    }

    /* Alternative Section */
    .alternative-section {
      background: linear-gradient(135deg, #fffaf0, #fff6e8);
      border-radius: 40px;
      padding: 28px;
      margin-top: 40px;
      border: 1px solid #ffebcd;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    .room-options {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0;
    }

    .room-card {
      background: white;
      border-radius: 28px;
      padding: 20px;
      flex: 1;
      min-width: 200px;
      border: 1px solid #ffe0b5;
      transition: all 0.3s;
      text-align: center;
    }

    .room-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
    }

    .room-price {
      font-weight: 800;
      font-size: 1.4rem;
      color: #c9772e;
      margin: 12px 0;
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .modal-card {
      background: white;
      max-width: 620px;
      width: 90%;
      border-radius: 48px;
      padding: 32px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #8b6ccf;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 28px;
      border: 2px solid #f0e8ff;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #b392e0;
      box-shadow: 0 0 0 3px rgba(108, 71, 194, 0.1);
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .pill {
      background: #f5f0fe;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.selected {
      background: linear-gradient(135deg, #6c47c2, #8b6ccf);
      color: white;
      transform: scale(1.02);
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: white;
      border-radius: 28px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .chat-item:hover {
      background: #faf7ff;
      transform: translateX(5px);
    }

    .forum-item {
      background: white;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }

    .forum-item:hover {
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .safety-card {
      background: white;
      border-radius: 32px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .hidden-page {
      display: none;
    }

    .text-muted {
      color: #a594c4;
      font-size: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      background: linear-gradient(135deg, #fef9f4, #fff5f0);
      border-radius: 48px;
    }

    @media (max-width: 768px) {
      .sidebar { width: 80px; }
      .content { padding: 20px; }
      .logo-text { font-size: 1.2rem; }
      .section-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-female"></i></div>

<!-- Profile Modal -->
<div id="profileModal" class="modal-bg">
  <div class="modal-card">

    <div class="form-group"><label><i class="fas fa-user"></i> Name</label><input id="profileName" value="Aarohi"></div>

<!-- Auth Modal -->
<div id="authModal" class="modal-bg" style="z-index: 2000;">
  <div class="modal-card">
    <h2 style="margin-bottom: 24px; text-align: center;"><i class="fas fa-lock"></i> Nest & Found</h2>
    <p class="text-muted" style="text-align: center; margin-bottom: 20px;">Secure women-only network</p>
    <div id="authStatus" style="color: #e65b65; margin-bottom: 12px; font-weight: 600; font-size: 0.85rem; text-align: center;"></div>

      <label><i class="fas fa-user"></i> Full Name</label>
      <input id="authName" placeholder="E.g., Priya" value="">
    </div>

      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="authEmail" placeholder="you@domain.com" value="testuser@example.com">
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-key"></i> Password</label>
      <input type="password" id="authPassword" placeholder="Minimum 6 characters" value="password123">
    </div>

    <button class="btn-primary" id="authSubmitBtn" style="width:100%; justify-content:center;">Sign In</button>
    <button class="btn-outline" id="authToggleBtn" style="width:100%; margin-top: 16px; border:none;  justify-content:center;">Need an account? Sign Up</button>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════
  // Nest & Found — Frontend Application Logic
  // ═══════════════════════════════════════════════

  const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000/api/v1' : '/api/v1';
  let token = localStorage.getItem('nftoken');
  let currentFilter = null;
  let matchesData = [];
  let curUser = {};

  // ── XSS Protection: escape user-generated HTML ──
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ── Utility: Score color ──
  function scoreColor(score) {
    if (score >= 8) return '#2c6e2c';
    if (score >= 6) return '#6c47c2';
    return '#c67a30';
  }

  function scoreBg(score) {
    if (score >= 8) return 'linear-gradient(135deg, #d4edd2, #e6f4e6)';
    if (score >= 6) return 'linear-gradient(135deg, #e9e3ff, #dfd5fc)';
    return 'linear-gradient(135deg, #fff3e0, #ffe0b2)';
  }

  // ── Loading spinner ──
  function showLoading(containerId) {
    const el = document.getElementById(containerId);
    if (el) el.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:#8b6ccf"></i><p class="text-muted" style="margin-top:12px">Finding your best matches...</p></div>`;
  }

  // ── Logout ──
  function logout() {
    localStorage.removeItem('nftoken');
    token = null;
    curUser = {};
    matchesData = [];
    authModal.style.visibility = 'visible';
    authModal.style.opacity = '1';
    authStatus.innerText = '';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
  }
  // Wire logout button
  document.getElementById('logoutBtn')?.addEventListener('click', logout);

  // ═══ AUTH HANDLING ═══
  const authModal = document.getElementById('authModal');
  const authStatus = document.getElementById('authStatus');
  let isRegistering = false;

  document.getElementById('authToggleBtn').addEventListener('click', () => {
    isRegistering = !isRegistering;
    document.getElementById('registerNameGroup').style.display = isRegistering ? 'block' : 'none';
    document.getElementById('authSubmitBtn').innerText = isRegistering ? 'Create Account' : 'Sign In';
    document.getElementById('authToggleBtn').innerText = isRegistering ? 'Already have an account? Sign In' : 'Need an account? Sign Up';
    authStatus.innerText = '';
  });

  document.getElementById('authSubmitBtn').addEventListener('click', async () => {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('authName').value.trim();

    // Client-side validation
    if (!email || !password) {
      authStatus.innerText = '⚠️ Please enter email and password.';
      return;
    }
    if (password.length < 6) {
      authStatus.innerText = '⚠️ Password must be at least 6 characters.';
      return;
    }
    if (isRegistering && !name) {
      authStatus.innerText = '⚠️ Please enter your name.';
      return;
    }

    authStatus.style.color = '#6c47c2';
    authStatus.innerText = '⏳ Processing...';

    try {
      if (isRegistering) {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email, password, name, age: 24, occupation: 'Professional',
            preferences: {
              sleep_pref: "Night", sleep_sense: "Light Sleeper",
              personality: "Ambivert", living_habit: "Flexible",
              noise_tolerance: "Moderate", guest_policy: "Occasional"
            }
          })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          authStatus.style.color = '#e65b65';
          authStatus.innerText = `❌ ${err.detail || 'Registration failed. Email may already exist.'}`;
          return;
        }
        authStatus.style.color = '#2c6e2c';
        authStatus.innerText = '✅ Registered! Logging in...';
        isRegistering = false;
      }

      // Login flow
      const fd = new URLSearchParams();
      fd.append('username', email);
      fd.append('password', password);
      const logRes = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: fd
      });

      if (!logRes.ok) {
        const err = await logRes.json().catch(() => ({}));
        authStatus.style.color = '#e65b65';
        authStatus.innerText = `❌ ${err.detail || 'Invalid credentials.'}`;
        return;
      }

      const data = await logRes.json();
      token = data.access_token;
      localStorage.setItem('nftoken', token);
      authModal.style.visibility = 'hidden';
      authModal.style.opacity = '0';
      await fetchProfile();
      renderPage('dashboard');
    } catch (e) {
      authStatus.style.color = '#e65b65';
      authStatus.innerText = '❌ Network error. Is the backend running?';
    }
  });

  // Verify auth on load
  if (!token) {
    authModal.style.visibility = 'visible';
    authModal.style.opacity = '1';
  } else {
    fetchProfile().then(ok => {
      if (!ok) { authModal.style.visibility = 'visible'; authModal.style.opacity = '1'; }
      else renderPage('dashboard');
    });
  }

  // ═══ PROFILE ═══
  async function fetchProfile() {
    try {
      const r = await fetch(`${API_URL}/users/me`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) { localStorage.removeItem('nftoken'); return false; }
      curUser = await r.json();

      // Populate profile modal
      document.getElementById('profileName').value = curUser.name || '';
      document.getElementById('profileAge').value = curUser.age || '';
      if (curUser.occupation) document.getElementById('profileOcc').value = curUser.occupation;

      if (curUser.preference) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
        if (curUser.preference.sleep_pref) document.querySelector(`[data-sleep="${curUser.preference.sleep_pref}"]`)?.classList.add('selected');
        if (curUser.preference.guest_policy) document.querySelector(`[data-guest="${curUser.preference.guest_policy}"]`)?.classList.add('selected');
        if (curUser.preference.noise_tolerance) document.querySelector(`[data-noise="${curUser.preference.noise_tolerance}"]`)?.classList.add('selected');
        if (curUser.preference.living_habit) document.querySelector(`[data-habit="${curUser.preference.living_habit}"]`)?.classList.add('selected');
        if (curUser.preference.personality) document.querySelector(`[data-personality="${curUser.preference.personality}"]`)?.classList.add('selected');
        if (curUser.preference.sleep_sense) document.querySelector(`[data-sense="${curUser.preference.sleep_sense}"]`)?.classList.add('selected');
      }
      return true;
    } catch (e) { return false; }
  }

  // Profile update
  document.getElementById('closeModalBtn').addEventListener('click', async () => {
    const getSelected = (groupId, dataKey) => {
      const sel = document.querySelector(`#${groupId} .selected`);
      return sel ? sel.dataset[dataKey] : null;
    };

    const payload = {
      name: document.getElementById('profileName').value,
      age: parseInt(document.getElementById('profileAge').value) || 20,
      occupation: document.getElementById('profileOcc').value,
      preferences: {
        sleep_pref: getSelected('sleepPrefGroup', 'sleep') || "Night",
        sleep_sense: getSelected('sleepSenseGroup', 'sense') || "Light Sleeper",
        personality: getSelected('personalityGroup', 'personality') || "Ambivert",
        living_habit: getSelected('habitsGroup', 'habit') || "Flexible",
        noise_tolerance: getSelected('noiseGroup', 'noise') || "Moderate",
        guest_policy: getSelected('guestPolicyGroup', 'guest') || "Occasional"
      }
    };

    await fetch(`${API_URL}/users/update`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    document.getElementById('profileModal').style.visibility = 'hidden';
    document.getElementById('profileModal').style.opacity = '0';
    showToast('✅ Profile saved successfully!');
    renderPage('dashboard');
  });

  // Toast notifications
  function showToast(msg) {
    const t = document.getElementById('toastMsg');
    if (t) { t.innerText = msg; setTimeout(() => t.innerText = '', 3000); }
  }

  // Toggle Pills
  document.querySelectorAll('.pill-group').forEach(grp => {
    grp.addEventListener('click', e => {
      if (e.target.classList.contains('pill')) {
        grp.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
        e.target.classList.add('selected');
      }
    });
  });

  // Profile Modal
  document.getElementById('openProfileModalBtn').addEventListener('click', () => {
    document.getElementById('profileModal').style.visibility = 'visible';
    document.getElementById('profileModal').style.opacity = '1';
  });

  // ═══ MATCHES ═══
  async function fetchMatches(endpoint = "/matches") {
    try {
      const r = await fetch(API_URL + endpoint, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!r.ok) return [];
      const res = await r.json();
      matchesData = res.matches || [];
      return matchesData;
    } catch (e) { return []; }
  }

  window.showProfile = (id) => {
    const m = matchesData.find(x => x.user.id === id);
    if (!m) return;
    const pref = m.user.preference;
    const score = m.compatibility_score;
    let desc = `👤 ${m.user.name}\n🎂 ${m.user.age} yrs\n💻 ${m.user.occupation || 'Professional'}\n⭐ Match Score: ${score}/10\n\n📌 Preferences:\n• Sleep: ${pref?.sleep_pref || 'N/A'}\n• Guests: ${pref?.guest_policy || 'N/A'}\n• Noise: ${pref?.noise_tolerance || 'N/A'}\n• Personality: ${pref?.personality || 'N/A'}\n• Living: ${pref?.living_habit || 'N/A'}`;
    alert(desc);
  };

  // Open chat with a matched user
  window.openChat = async (userId, userName) => {
    // Switch to messages page
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-page="messages"]').classList.add('active');
    renderPage('messages');

    // Show chat detail
    document.getElementById('chatList').style.display = 'none';
    document.getElementById('chatDetail').style.display = 'block';
    document.getElementById('activeChatName').innerText = `💬 Chat with ${userName}`;
    document.getElementById('chatMessagesArea').innerHTML = '<p class="text-muted" style="text-align:center">Start of conversation</p>';

    // Load existing messages
    try {
      const r = await fetch(`${API_URL}/chat/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.ok) {
        const msgs = await r.json();
        if (msgs.length) {
          document.getElementById('chatMessagesArea').innerHTML = msgs.map(msg => {
            const isMine = msg.sender_id === curUser.id;
            return `<div style="text-align:${isMine ? 'right' : 'left'}; margin:8px 0">
              <span style="background:${isMine ? 'linear-gradient(135deg, #6c47c2, #8b6ccf)' : '#f0e8ff'}; color:${isMine ? '#fff' : '#333'}; padding:10px 18px; border-radius:20px; display:inline-block; max-width:70%; font-size:0.9rem">${escapeHTML(msg.content)}</span>
              <div class="text-muted" style="font-size:0.65rem; margin-top:2px">${new Date(msg.created_at).toLocaleTimeString()}</div>
            </div>`;
          }).join('');
        }
      }
    } catch (e) { /* silent */ }

    // Wire send button
    const sendBtn = document.getElementById('sendMsgBtn');
    const newSendBtn = sendBtn.cloneNode(true);
    sendBtn.parentNode.replaceChild(newSendBtn, sendBtn);
    newSendBtn.addEventListener('click', async () => {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;

      try {
        await fetch(`${API_URL}/chat/send`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ receiver_id: userId, content })
        });
        input.value = '';
        // Reload messages
        openChat(userId, userName);
      } catch (e) { showToast('Failed to send message.'); }
    });
  };

  async function renderTopMatches() {
    showLoading('topMatchesContainer');
    const ms = await fetchMatches('/matches/top');
    const container = document.getElementById('topMatchesContainer');
    if (!ms.length) {
      if (container) container.innerHTML = `<div class="empty-state"><i class="fas fa-heart" style="font-size:2rem; color:#b392e0; margin-bottom:12px"></i><h3>No matches yet</h3><p class="text-muted">Update your profile preferences to start matching!</p></div>`;
      return;
    }
    if (container) container.innerHTML = ms.map(m => {
      const s = m.compatibility_score;
      return `<div class="match-card" onclick="showProfile(${m.user.id})">
        <div style="display:flex; gap:16px; align-items:center">
          <div class="avatar-large"><i class="fas fa-female"></i></div>
          <div>
            <h3 style="font-size:1.2rem">${m.user.name}, ${m.user.age}</h3>
            <div class="text-muted"><i class="fas fa-briefcase"></i> ${m.user.occupation || 'Student'}</div>
          </div>
        </div>
        <div class="match-tags">
          <span class="tag" style="background:${scoreBg(s)}; color:${scoreColor(s)}"><i class="fas fa-star"></i> ${Math.round(s)}/10</span>
          <span class="tag"><i class="fas fa-moon"></i> ${m.user.preference?.sleep_pref || ''}</span>
        </div>
        <p style="font-size:0.75rem; margin-top:10px; color:#5b3d9e"><i class="fas fa-check"></i> ${m.explanation}</p>
        <button class="btn-outline" style="margin-top:12px; font-size:0.75rem; padding:8px 16px" onclick="event.stopPropagation(); openChat(${m.user.id}, '${m.user.name}')"><i class="fas fa-comment"></i> Message</button>
      </div>`;
    }).join('');
  }

  async function renderMatchesGrid() {
    showLoading('allMatchesGrid');
    const ep = currentFilter ? `/matches/filter?type=${currentFilter}` : `/matches`;
    const ms = await fetchMatches(ep);
    const grid = document.getElementById('allMatchesGrid');
    if (!ms.length) {
      if (grid) grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1"><i class="fas fa-filter" style="font-size:2rem; color:#b392e0; margin-bottom:12px"></i><h3>No matches for this filter</h3><p class="text-muted">Try a different filter or update your preferences.</p></div>`;
      return;
    }
    if (grid) grid.innerHTML = ms.map(m => {
      const s = m.compatibility_score;
      return `<div class="profile-card" onclick="showProfile(${m.user.id})">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <div>
            <span style="font-size:1.2rem; font-weight:800">${m.user.name}, ${m.user.age}</span>
            ${m.user.verification_status ? '<i class="fas fa-check-circle" style="color:#2c6e2c; margin-left:6px"></i>' : ''}
          </div>
          <span class="compatibility-badge" style="background:${scoreBg(s)}; color:${scoreColor(s)}"><i class="fas fa-star"></i> ${s}</span>
        </div>
        <div class="text-muted" style="margin:12px 0"><i class="fas fa-briefcase"></i> ${m.user.occupation || 'Professional'}</div>
        <div class="text-muted" style="margin-top:10px; font-size:0.8rem">${m.explanation || ''}</div>
        <button class="btn-outline" style="margin-top:14px; font-size:0.75rem; padding:8px 16px; width:100%" onclick="event.stopPropagation(); openChat(${m.user.id}, '${m.user.name}')"><i class="fas fa-comment"></i> Start Chat</button>
      </div>`;
    }).join('');
  }

  // ═══ CHAT PAGE ═══
  async function renderChatList() {
    const chatList = document.getElementById('chatList');
    document.getElementById('chatDetail').style.display = 'none';
    chatList.style.display = 'block';

    // Populate chat list from matches
    if (!matchesData.length) {
      await fetchMatches('/matches');
    }

    if (!matchesData.length) {
      chatList.innerHTML = `<div class="empty-state"><i class="fas fa-comments" style="font-size:2rem; color:#b392e0; margin-bottom:12px"></i><h3>No conversations yet</h3><p class="text-muted">Match with roommates to start chatting!</p></div>`;
      return;
    }

    chatList.innerHTML = matchesData.slice(0, 10).map(m => `
      <div class="chat-item" onclick="openChat(${m.user.id}, '${m.user.name}')">
        <div class="avatar-large" style="width:48px; height:48px; min-width:48px; border-radius:50%"><i class="fas fa-female"></i></div>
        <div style="flex:1">
          <div style="font-weight:700">${m.user.name}</div>
          <div class="text-muted">Tap to start chatting...</div>
        </div>
        <span class="tag" style="background:${scoreBg(m.compatibility_score)}; color:${scoreColor(m.compatibility_score)}"><i class="fas fa-star"></i> ${Math.round(m.compatibility_score)}/10</span>
      </div>
    `).join('');
  }

  // ═══ COMMUNITY ═══
  function renderCommunity() {
    const posts = [
      { title: "Safe neighborhoods for women near tech parks", upvotes: 42, replies: 18, tag: "Safety" },
      { title: "How to split rent fairly in Bangalore (INR)", upvotes: 56, replies: 24, tag: "Finance" },
      { title: "Tips for first-time roommates — boundaries & communication", upvotes: 89, replies: 31, tag: "Lifestyle" },
      { title: "Best co-living spaces for working women in India", upvotes: 63, replies: 15, tag: "Housing" }
    ];
    document.getElementById('forumPosts').innerHTML = posts.map(p => `
      <div class="forum-item">
        <div style="display:flex; justify-content:space-between; align-items:start">
          <strong><i class="fas fa-comment" style="color:#8b6ccf"></i> ${p.title}</strong>
          <span class="tag">${p.tag}</span>
        </div>
        <div style="margin-top:12px; display:flex; gap:20px">
          <span><i class="far fa-thumbs-up"></i> ${p.upvotes}</span>
          <span><i class="far fa-comment"></i> ${p.replies} replies</span>
        </div>
      </div>
    `).join('');
  }

  // ═══ SAFETY ═══
  function initSafety() {
    document.getElementById('anonymousAlertBtn')?.addEventListener('click', async () => {
      try {
        const r = await fetch(`${API_URL}/safety/emergency-alert`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (r.ok) {
          const data = await r.json();
          alert(`🚨 ${data.status}\n${data.action}`);
        } else {
          alert('🚨 Anonymous alert submitted safely.');
        }
      } catch (e) { alert('🚨 Anonymous alert submitted safely.'); }
    });

    document.getElementById('downloadAgreementLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      const agreement = `ROOMMATE AGREEMENT — Nest & Found\n${'═'.repeat(45)}\n\nDate: ${new Date().toLocaleDateString()}\nUser: ${curUser.name || 'N/A'}\n\n1. SHARED SPACES: Both parties agree to maintain cleanliness.\n2. GUESTS: Follow the agreed guest policy.\n3. NOISE: Respect quiet hours as per preference.\n4. RENT: Split equally unless otherwise agreed.\n5. COMMUNICATION: Address concerns directly & respectfully.\n6. TERMINATION: 30-day notice required.\n\nSigned digitally via Nest & Found Platform.`;
      const blob = new Blob([agreement], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Roommate_Agreement_NestAndFound.txt';
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  // ═══ FILTER CHIPS ═══
  function attachChipListeners() {
    document.querySelectorAll('.chip[data-filter]').forEach(chip => {
      chip.removeEventListener('click', chip._hdl);
      chip._hdl = async () => {
        document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        if (!document.getElementById('matches-page').classList.contains('hidden-page')) renderMatchesGrid();
        else renderTopMatches();
      };
      chip.addEventListener('click', chip._hdl);
    });
  }

  // ═══ PAGE ROUTING ═══
  function renderPage(p) {
    document.querySelectorAll('[id$="-page"]').forEach(el => el.classList.add('hidden-page'));
    const pg = document.getElementById(`${p}-page`);
    if (pg) pg.classList.remove('hidden-page');
    else return;

    if (p === 'dashboard') { renderTopMatches(); attachChipListeners(); initDashboardButtons(); }
    if (p === 'matches') { renderMatchesGrid(); attachChipListeners(); }
    if (p === 'messages') { renderChatList(); }
    if (p === 'community') renderCommunity();
    if (p === 'safety') initSafety();
  }

  function initDashboardButtons() {
    document.getElementById('safetyCheckinBtn')?.addEventListener('click', () => {
      showToast('✅ Safety check-in recorded at ' + new Date().toLocaleTimeString());
    });
    document.getElementById('reportConcernBtn')?.addEventListener('click', () => {
      const reason = prompt('Describe your concern:');
      if (reason) showToast('🚩 Concern reported. Our team will review it.');
    });
  }

  // ═══ BUILD UI ═══
  const contentDiv = document.getElementById('mainContent');
  contentDiv.innerHTML = `
    <div id="dashboard-page"><div class="section-title"><i class="fas fa-fire"></i> Your Top Matches</div><div class="cards-grid" id="topMatchesContainer"></div><div class="filter-chips"><span class="chip" data-filter="verified"><i class="fas fa-shield-alt"></i> Verified Only</span><span class="chip" data-filter="noMaleGuests"><i class="fas fa-user-slash"></i> No Male Guests</span><span class="chip" data-filter="earlyBird"><i class="fas fa-sun"></i> Early Bird</span><span class="chip" data-filter="quietOnly"><i class="fas fa-volume-mute"></i> Quiet Only</span></div><div style="display:flex; gap:16px; margin-bottom:24px"><button class="btn-primary" id="safetyCheckinBtn"><i class="fas fa-phone-alt"></i> Safety Check-In</button><button class="btn-outline" id="reportConcernBtn"><i class="fas fa-flag"></i> Report Concern</button></div><div id="dashboardAltSection"></div><div id="toastMsg" class="text-muted" style="margin-top:16px; font-weight:600; color:#2c6e2c"></div></div>
    <div id="matches-page" class="hidden-page"><div class="section-title"><i class="fas fa-handshake"></i> Smart Roommate Matches</div><div class="filter-chips"><span class="chip" data-filter="verified"><i class="fas fa-shield-alt"></i> Verified Only</span><span class="chip" data-filter="noMaleGuests"><i class="fas fa-user-slash"></i> No Male Guests</span><span class="chip" data-filter="earlyBird"><i class="fas fa-sun"></i> Early Bird</span><span class="chip" data-filter="quietOnly"><i class="fas fa-volume-mute"></i> Quiet Only</span></div><div class="matches-grid" id="allMatchesGrid"></div></div>
    <div id="messages-page" class="hidden-page"><div class="section-title"><i class="fas fa-comments"></i> Conversations</div><div class="chat-list" id="chatList"></div><div id="chatDetail" style="display:none; margin-top:24px"><div id="activeChatName" style="font-weight:700; font-size:1.2rem; margin-bottom:12px"></div><div style="background:#f8f3ff; border-radius:28px; padding:16px; margin:12px 0; min-height:200px; max-height:400px; overflow-y:auto" id="chatMessagesArea"></div><div style="display:flex; gap:12px"><input type="text" id="messageInput" placeholder="Type your message..." style="flex:1; padding:14px 20px; border-radius:40px; border:2px solid #f0e8ff"><button class="btn-primary" id="sendMsgBtn">Send</button></div><button class="btn-outline" id="backToChatListBtn" style="margin-top:16px"><i class="fas fa-arrow-left"></i> Back to Conversations</button></div></div>
    <div id="community-page" class="hidden-page"><div class="section-title"><i class="fas fa-globe-asia"></i> Community Forum</div><div id="forumPosts"></div></div>
    <div id="safety-page" class="hidden-page"><div class="section-title"><i class="fas fa-shield-alt"></i> Safety Center</div><div class="safety-card"><div style="display:flex; justify-content:space-between; margin-bottom:12px"><span><i class="fas fa-id-card"></i> Identity Verification</span><span style="color:#2c6e2c"><i class="fas fa-check-circle"></i> Verified</span></div><div style="display:flex; justify-content:space-between; margin-bottom:12px"><span><i class="fas fa-search"></i> Background Check</span><span class="text-muted">Optional upgrade</span></div><div style="display:flex; justify-content:space-between; margin-bottom:20px"><span><i class="fas fa-map-marker-alt"></i> Safe Check-In</span><span style="color:#2c6e2c"><i class="fas fa-check"></i> Active</span></div><hr><button class="btn-outline" id="anonymousAlertBtn" style="width:100%; margin:16px 0"><i class="fas fa-exclamation-triangle"></i> Emergency Alert</button><a id="downloadAgreementLink" href="#" style="display:inline-block; text-align:center; width:100%; padding:12px; background:#f5efff; border-radius:40px; text-decoration:none; color:#6c47c2; font-weight:600"><i class="fas fa-file-alt"></i> Download Roommate Agreement</a></div></div>
  `;

  // Nav clicks
  document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPage(btn.dataset.page);
  }));

  // Back to chat list
  document.getElementById('backToChatListBtn')?.addEventListener('click', () => renderChatList());

  attachChipListeners();
</script>
</body>
</html>
